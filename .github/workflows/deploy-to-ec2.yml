name: Sync Files to EC2

on:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            cd /home/ubuntu/proyects/tcm_microservicios || exit 1
            # Actualizamos la referencia de git para que el servidor sepa qué hay de nuevo
            git fetch origin main
            git reset --hard origin/main
            echo "✅ Archivos sincronizados. El sistema está listo para el despliegue manual."