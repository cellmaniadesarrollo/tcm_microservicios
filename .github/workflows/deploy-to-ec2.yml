name: Deploy to EC2 on Push

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT }}
          command_timeout: 45m
          script: |
            set -e
            cd /home/ubuntu/proyects/tcm_microservicios || exit 1

            # 1. Actualizar código y detectar qué cambió
            git fetch origin main
            CHANGED=$(git diff --name-only HEAD origin/main)
            echo "Archivos cambiados:"
            echo "$CHANGED"
            git reset --hard origin/main

            cd docker

            # 2. Infraestructura crítica — nombres de SERVICIO del compose (no de contenedor)
            for SVC in redis rabbitmq kafka; do
              if ! docker compose -f compose.prod.yml ps --status running | grep -q "$SVC"; then
                echo "⚠️  $SVC no está corriendo, levantando..."
                docker compose -f compose.prod.yml up -d $SVC
              else
                echo "✅ $SVC ya está corriendo"
              fi
            done

            # 3. Sincronizar tópicos Kafka (idempotente, rápido si ya existen)
            echo "Sincronizando tópicos Kafka..."
            docker compose -f compose.prod.yml up -d init-kafka
            timeout 60 docker compose -f compose.prod.yml wait init-kafka || true

            # 4. Detectar servicios que cambiaron
            SERVICES_TO_UPDATE=""
            declare -A SERVICE_PATHS=(
              ["gateway"]="gateway/"
              ["users"]="microservices/users/"
              ["companies"]="microservices/companies/"
              ["clients"]="microservices/clients/"
              ["orders"]="microservices/orders/"
              ["subscriptions"]="microservices/subscriptions/"
              ["reports"]="microservices/reporting-hub/"
              ["realtime"]="realtime/"
              ["notification-dispatcher"]="microservices/notification-dispatcher/"
            )

            for SERVICE in "${!SERVICE_PATHS[@]}"; do
              PATH_PATTERN="${SERVICE_PATHS[$SERVICE]}"
              if echo "$CHANGED" | grep -q "$PATH_PATTERN"; then
                echo "🔄 $SERVICE tiene cambios"
                SERVICES_TO_UPDATE="$SERVICES_TO_UPDATE $SERVICE"
              else
                echo "⏭️  $SERVICE sin cambios, skip"
              fi
            done

            # Fallback: si el cambio fue en docker/ o archivos raíz, actualizamos todo
            if [ -z "$SERVICES_TO_UPDATE" ]; then
              echo "⚠️  No se detectaron cambios específicos → actualizando todos"
              SERVICES_TO_UPDATE="gateway users companies clients orders subscriptions reports realtime notification-dispatcher"
            fi

            # 5. Build + Deploy uno por uno para no saturar RAM
            echo "🚀 Desplegando servicios: $SERVICES_TO_UPDATE"
            for SERVICE in $SERVICES_TO_UPDATE; do
              echo "========================================"
              echo "🔨 Construyendo: $SERVICE"
              echo "========================================"
              docker compose -f compose.prod.yml build "$SERVICE"

              echo "🚢 Levantando: $SERVICE"
              docker compose -f compose.prod.yml up -d --force-recreate "$SERVICE"
              echo "✅ $SERVICE desplegado"

              # Pausa solo después de servicios que conectan a BD (más pesados al iniciar)
              case "$SERVICE" in
                users|orders|clients|companies|subscriptions|notification-dispatcher)
                  echo "⏸  Pausa para que $SERVICE estabilice..."
                  sleep 5
                  ;;
              esac

              echo ""
            done

            # 6. Limpieza de imágenes huérfanas
            docker image prune -f

            echo "🎉 Despliegue completado."