name: Deploy to EC2 on Push

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT }}
          # Aumentamos el tiempo de espera por seguridad (30 minutos)
          command_timeout: 30m
          script: |
            cd /home/ubuntu/proyects/tcm_microservicios || exit 1
            git fetch origin main
            git reset --hard origin/main
            
            # ELIMINADO: docker system prune (Ya tienes tu cron de domingo)

            cd docker

            # 1. Asegurar que la infraestructura esté arriba
            echo "Revisando infraestructura (Redis, RabbitMQ, Kafka)..."
            docker compose -f compose.prod.yml up -d redis-realtime rabbitmq kafka
            
            # 2. Buildear todos los servicios usando caché
            # Al quitar --no-cache, Docker solo reconstruirá desde el paso 'COPY . .' 
            # de tu nuevo Dockerfile si detecta cambios en el código.
            echo "Construyendo imágenes con caché..."
            docker compose -f compose.prod.yml build --pull

            # 3. Levantar/Actualizar los servicios
            # --force-recreate asegura que se use la nueva imagen construida.
            # --remove-orphans limpia contenedores que ya no existan en tu compose.
            echo "Desplegando microservicios..."
            docker compose -f compose.prod.yml up -d --force-recreate --remove-orphans
            
            # 4. Limpieza ligera de imágenes "dangling" (huérfanas del build actual)
            docker image prune -f
            
            echo "🚀 Despliegue optimizado completado con éxito."