name: Deploy to EC2 on Push

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT }}
          command_timeout: 30m
          script: |
            set -e
            cd /home/ubuntu/proyects/tcm_microservicios || exit 1

            # 1. Actualizar código y detectar qué cambió
            git fetch origin main
            CHANGED=$(git diff --name-only HEAD origin/main)
            echo "Archivos cambiados:"
            echo "$CHANGED"
            git reset --hard origin/main
            
            cd docker

            # 2. Levantar Infraestructura Crítica
            # Sin --force-recreate para que Rabbit y Kafka no se reinicien si ya están bien
            echo "Verificando infraestructura (Redis, RabbitMQ, Kafka)..."
            docker compose -f compose.prod.yml up -d redis-realtime rabbitmq kafka

            # 3. Sincronizar Tópicos de Kafka
            # Solo corre el contenedor temporal para crear tópicos nuevos si los hay
            echo "Asegurando que los tópicos existan..."
            docker compose -f compose.prod.yml up init-kafka

            # 4. Construcción de Imágenes (Uso de Caché inteligente)
            # Gracias a tus nuevos Dockerfiles, esto será ultra rápido en los siguientes pushes
            echo "Construyendo imágenes de microservicios..."
            docker compose -f compose.prod.yml build --pull

            # 5. Despliegue de Microservicios (Código NestJS)
            # Definimos la lista de servicios que SÍ queremos recrear para aplicar cambios de código
            # Nota: No incluimos 'kafka' ni 'rabbitmq' aquí para evitar cortes de conexión
            SERVICES="gateway users companies clients orders subscriptions reports realtime notification-dispatcher"
            
            echo "Actualizando contenedores de aplicaciones..."
            docker compose -f compose.prod.yml up -d --force-recreate --remove-orphans $SERVICES

            # 6. Limpieza de imágenes en desuso
            # Borra solo las imágenes "dangling" generadas por el build actual
            docker image prune -f
            
            echo "🚀 Despliegue completado con éxito."