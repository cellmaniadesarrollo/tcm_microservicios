name: Deploy to EC2 on Push

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT }}
          # Tiempo de espera extendido para el primer despliegue o builds pesados
          command_timeout: 30m
          script: |
            # 1. Navegar al proyecto y actualizar código
            cd /home/ubuntu/proyects/tcm_microservicios || exit 1
            git fetch origin main
            git reset --hard origin/main
            
            # 1. Limpieza total antes de empezar
            docker system prune -af --volumes

            cd docker

            # 2. Levantar primero la infraestructura (Redis, RabbitMQ, Kafka)
            # Esto asegura que los microservicios encuentren los brokers listos
            echo "Levantando infraestructura..."
            docker compose -f compose.prod.yml up -d redis-realtime rabbitmq kafka
            
            # 3. Buildear y levantar microservicio por microservicio
            # Definimos la lista de tus servicios (ajusta los nombres si varían en tu compose)
            SERVICES=("gateway" "users" "companies" "clients" "orders" "subscriptions" "reports" "realtime" "notification-dispatcher")

            for SERVICE in "${SERVICES[@]}"; do
              echo "--------------------------------------------"
              echo "Desplegando: $SERVICE"
              echo "--------------------------------------------"
              
              # Build individual sin caché
              docker compose -f compose.prod.yml build --no-cache --pull $SERVICE
              
              # Levantar individual con recreación forzada
              docker compose -f compose.prod.yml up -d --force-recreate $SERVICE
              
              # Opcional: Pausa de 5 segundos para no saturar la CPU
              sleep 5
            done

            # 4. Limpieza final de imágenes intermedias
            docker image prune -f
            
            echo "🚀 Despliegue secuencial completado con éxito."
