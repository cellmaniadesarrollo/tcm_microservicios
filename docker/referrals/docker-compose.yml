name: tcm-referrals

services:
  referrals:
    build:
      context: ../../microservices/referrals
      dockerfile: Dockerfile.dev
    container_name: ms-referrals
    restart: always
    volumes:
      - ../../microservices/referrals:/app
      - /app/node_modules
    command: ["npm", "run", "start:dev"]
    env_file: [../.env] 
    environment:
      - NODE_ENV=development
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME_REFERRALS}          # ← Cambiado
      - RABBIT_URL=${RABBIT_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    networks: 
      - backend
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get({host:'127.0.0.1',port:3002,path:'/health'}, r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

networks:
  backend:
    external: true