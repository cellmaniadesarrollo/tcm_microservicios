name: tcm-gateway

services:
  gateway:
    build:
      context: ../../gateway
      dockerfile: Dockerfile.dev
    container_name: ms-gateway
    restart: always
    ports: ["3000:3000"]
    volumes:
      - ../../gateway:/app
      - /app/node_modules
    command: ["npm", "run", "start:dev"]
    env_file: [../.env]
    networks: [backend]

  realtime:
    build:
      context: ../../realtime
      dockerfile: Dockerfile.dev
    container_name: ms-realtime
    restart: always
    ports: ["3002:3002"]
    volumes:
      - ../../realtime:/app
      - /app/node_modules
    command: ["npm", "run", "start"]
    env_file: [../.env]
    environment:
      - REDIS_URL=redis://redis-realtime:6379
      - RABBIT_URL=amqp://guest:guest@ms-notifications-rabbitmq:5672 
      - TASK_BOARD_URL=${TASK_BOARD_URL}
    networks: [backend]

networks:
  backend:
    external: true