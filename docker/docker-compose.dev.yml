name: teamcellmania-backend-dev

services:
  # ─────────────────────────────────────────
  # INFRAESTRUCTURA
  # ─────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID
      - KAFKA_PROCESS_ROLES
      - KAFKA_CONTROLLER_QUORUM_VOTERS
      - KAFKA_CONTROLLER_LISTENER_NAMES
      - KAFKA_LISTENERS
      - KAFKA_ADVERTISED_LISTENERS
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
      - KAFKA_INTER_BROKER_LISTENER_NAME
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
      - KAFKA_LOG_RETENTION_HOURS
      - KAFKA_NUM_PARTITIONS
      - CLUSTER_ID
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  init-kafka:
    image: apache/kafka:3.8.0
    container_name: init-kafka
    restart: "no"
    networks:
      - backend
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        TOPICS="
          ms.client.created
          ms.client.updated
          ms.company.created
          ms.company.updated
        "
        echo "⏳ Creando topics en Kafka..."
        for TOPIC in $$TOPICS; do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
            --create --if-not-exists \
            --topic $$TOPIC \
            --partitions 1 --replication-factor 1
        done
        echo "🎉 Todos los topics listos"

  redis:
    image: redis:7-alpine
    container_name: redis-realtime
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────
  # CAPA 1 — companies
  # Espera: rabbitmq healthy + init-kafka completado
  # ─────────────────────────────────────────

  companies:
    build:
      context: ../microservices/companies
      dockerfile: Dockerfile.dev
    container_name: ms-companies
    restart: always
    volumes:
      - ../microservices/companies:/app
      - /app/node_modules
    command: ["npm", "run", "start"]
    environment:
      - NODE_ENV=development
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME_COMPANIES}
      - RABBIT_URL=${RABBIT_URL}
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get({host:'127.0.0.1',port:3000,path:'/health'}, r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s  # NestJS tarda en arrancar en dev

  # ─────────────────────────────────────────
  # CAPA 2 — clients, users, subscriptions
  # Espera: companies healthy
  # ─────────────────────────────────────────

  clients:
    build:
      context: ../microservices/clients
      dockerfile: Dockerfile.dev
    container_name: ms-clients
    restart: always
    volumes:
      - ../microservices/clients:/app
      - /app/node_modules
    command: ["npm", "run", "start:dev"]
    environment:
      - NODE_ENV=development
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME_CLIENTS}
      - RABBIT_URL=${RABBIT_URL}
      - KAFKA_BOOTSTRAP_SERVERS
    networks:
      - backend
    depends_on:
      companies:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get({host:'127.0.0.1',port:3000,path:'/health'}, r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  users:
    build:
      context: ../microservices/users
      dockerfile: Dockerfile.dev
    container_name: ms-users
    volumes:
      - ../microservices/users:/app
      - /app/node_modules
    restart: always
    command: ["npm", "run", "start"]
    environment:
      - NODE_ENV=development
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME_USERS}
      - RABBIT_URL=${RABBIT_URL}
      - KAFKA_BOOTSTRAP_SERVERS
    networks:
      - backend
    depends_on:
      companies:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get({host:'127.0.0.1',port:3000,path:'/health'}, r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  subscriptions:
    build:
      context: ../microservices/subscriptions
      dockerfile: Dockerfile.dev
    container_name: ms-subscriptions
    restart: always
    volumes:
      - ../microservices/subscriptions:/app
      - /app/node_modules
      - /app/dist
    command: ["npm", "run", "start:dev"]
    environment:
      - NODE_ENV=development
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME_SUBSCRIPTIONS}
      - RABBIT_URL=${RABBIT_URL}
      - KAFKA_BOOTSTRAP_SERVERS
    networks:
      - backend
    depends_on:
      companies:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get({host:'127.0.0.1',port:3000,path:'/health'}, r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # CAPA 3 — orders
  # Espera: clients + users + subscriptions healthy
  # ─────────────────────────────────────────

  orders:
    build:
      context: ../microservices/orders
      dockerfile: Dockerfile.dev
    container_name: ms-orders
    restart: always
    volumes:
      - ../microservices/orders:/app
      - /app/node_modules
    command: ["npm", "run", "start"]
    environment:
      - NODE_ENV=development
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME_ORDERS}
      - RABBIT_URL=${RABBIT_URL}
      - MYSQL_DB_HOST1=${MYSQL_DB_HOST1}
      - MYSQL_DB_USER=${MYSQL_DB_USER}
      - MYSQL_DB_PORT=${MYSQL_DB_PORT}
      - MYSQL_DB_PASSWORD=${MYSQL_DB_PASSWORD}
      - MYSQL_DB_NAME=${MYSQL_DB_NAME}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
      - KAFKA_BOOTSTRAP_SERVERS
    networks:
      - backend
    depends_on:
      clients:
        condition: service_healthy
      users:
        condition: service_healthy
      subscriptions:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get({host:'127.0.0.1',port:3000,path:'/health'}, r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # CAPA 4 — gateway, realtime
  # Espera: orders healthy
  # ─────────────────────────────────────────

  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile.dev
    container_name: ms-gateway
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ../gateway:/app
      - /app/node_modules
    command: ["npm", "run", "start"]
    environment:
      - NODE_ENV=development
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - RABBIT_URL=${RABBIT_URL}
    networks:
      - backend
    depends_on:
      orders:
        condition: service_healthy

  realtime:
    build:
      context: ../realtime
      dockerfile: Dockerfile.dev
    container_name: ms-realtime
    restart: always
    volumes:
      - ../realtime:/app
      - /app/node_modules
    command: ["npm", "run", "start"]
    environment:
      - NODE_ENV=development
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - RABBIT_URL=${RABBIT_URL}
      - REDIS_URL=redis://redis:6379
    ports:
      - "3002:3002"
    networks:
      - backend
    depends_on:
      orders:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  backend:

volumes:
  kafka_data:
  redis_data: