name: tcm-services

services:
  clients:
    build:
      context: ../../microservices/clients
      dockerfile: Dockerfile.dev
    container_name: ms-clients
    restart: always
    volumes:
      - ../../microservices/clients:/app
      - /app/node_modules
    command: ["npm", "run", "start"]
    env_file: [../.env]
    environment:
      - NODE_ENV=development
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME_CLIENTS}
      - RABBIT_URL=${RABBIT_URL}
      - KAFKA_BOOTSTRAP_SERVERS
    networks: [backend]
    healthcheck: &node-health
      test: ["CMD-SHELL", "node -e \"require('http').get({host:'127.0.0.1',port:3000,path:'/health'}, r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  users:
    build:
      context: ../../microservices/users
      dockerfile: Dockerfile.dev
    container_name: ms-users
    restart: always
    volumes:
      - ../../microservices/users:/app
      - /app/node_modules
    command: ["npm", "run", "start"]
    env_file: [../.env]
    environment:
      - NODE_ENV=development
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME_USERS}
      - RABBIT_URL=${RABBIT_URL}
      - KAFKA_BOOTSTRAP_SERVERS
    networks: [backend]
    healthcheck: *node-health

  subscriptions:
    build:
      context: ../../microservices/subscriptions
      dockerfile: Dockerfile.dev
    container_name: ms-subscriptions
    restart: always
    volumes:
      - ../../microservices/subscriptions:/app
      - /app/node_modules 
    command: ["npm", "run", "start"]
    env_file: [../.env]
    environment:
      - NODE_ENV=development
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME_SUBSCRIPTIONS}
      - RABBIT_URL=${RABBIT_URL}
      - KAFKA_BOOTSTRAP_SERVERS
    networks: [backend]
    healthcheck: *node-health

  orders:
    build:
      context: ../../microservices/orders
      dockerfile: Dockerfile.dev
    container_name: ms-orders
    restart: always
    volumes:
      - ../../microservices/orders:/app
      - /app/node_modules
    command: ["npm", "run", "start:dev"]
    env_file: [../.env]
    environment:
      - NODE_ENV=development
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME_ORDERS}
      - RABBIT_URL=${RABBIT_URL}
      - MYSQL_DB_HOST1=${MYSQL_DB_HOST1}
      - MYSQL_DB_USER=${MYSQL_DB_USER}
      - MYSQL_DB_PORT=${MYSQL_DB_PORT}
      - MYSQL_DB_PASSWORD=${MYSQL_DB_PASSWORD}
      - MYSQL_DB_NAME=${MYSQL_DB_NAME}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
      - KAFKA_BOOTSTRAP_SERVERS
    networks: [backend]
    healthcheck: *node-health

networks:
  backend:
    external: true