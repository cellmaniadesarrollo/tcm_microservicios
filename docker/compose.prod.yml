# docker/compose.prod.yml
# Versión de producción en EC2 con RabbitMQ LOCAL (no expuesto)

services:
  # ─────────────────────────────────────────
  # INFRAESTRUCTURA
  # ─────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always

  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=${KAFKA_NODE_ID:-1}
      - KAFKA_PROCESS_ROLES=${KAFKA_PROCESS_ROLES:-broker,controller}
      - KAFKA_CONTROLLER_QUORUM_VOTERS=${KAFKA_CONTROLLER_QUORUM_VOTERS:-1@kafka:9093}
      - KAFKA_CONTROLLER_LISTENER_NAMES=${KAFKA_CONTROLLER_LISTENER_NAMES:-CONTROLLER}
      - KAFKA_LISTENERS=${KAFKA_LISTENERS:-PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093}
      - KAFKA_ADVERTISED_LISTENERS=${KAFKA_ADVERTISED_LISTENERS:-PLAINTEXT://kafka:9092}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:-CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT}
      - KAFKA_INTER_BROKER_LISTENER_NAME=${KAFKA_INTER_BROKER_LISTENER_NAME:-PLAINTEXT}
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:-1}
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR:-1}
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:-1}
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=${KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS:-0}
      - KAFKA_LOG_RETENTION_HOURS=${KAFKA_LOG_RETENTION_HOURS:-168}
      - KAFKA_NUM_PARTITIONS=${KAFKA_NUM_PARTITIONS:-1}
      - CLUSTER_ID=${CLUSTER_ID}
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────
  # JOB: Crear topics en Kafka (corre una vez y termina)
  # Para agregar un topic nuevo, solo añade una línea a TOPICS.
  # ─────────────────────────────────────────

  init-kafka:
    image: apache/kafka:3.8.0
    container_name: init-kafka
    restart: "no"
    networks:
      - backend
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        TOPICS="
          ms.client.created
          ms.client.updated
          ms.company.created
          ms.company.updated
          ms.user.created
          ms.user.updated
          ms.client.billing.created
          ms.client.billing.updated
          ms.order.created
          ms.order.updated
          ms.taskboard.created
          ms.taskboard.updated
          ms.taskboard.deleted
          ms.inventory.spare.assigned 
          ms.inventory.spare.cancelled 
          ms.inventory.spare.returned
          users.get-token
          users.has-token
          users.refresh-token
          users.revoke-token
          users.save-token
          users.requests
          taskboard.responses
        "

        echo "⏳ Sincronizando tópicos en Kafka..."
        CREATED=0
        SKIPPED=0

        for TOPIC in $$TOPICS; do
          TRIMMED=$(echo $$TOPIC | tr -d '[:space:]')
          [ -z "$$TRIMMED" ] && continue

          EXISTS=$(/opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server kafka:9092 \
            --list 2>/dev/null | grep -x "$$TRIMMED" || true)

          if [ -z "$$EXISTS" ]; then
            /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
              --create \
              --topic $$TRIMMED \
              --partitions 1 --replication-factor 1
            echo "  ✅ Creado: $$TRIMMED"
            CREATED=$$((CREATED + 1))
          else
            echo "  ⏭️  Ya existe: $$TRIMMED"
            SKIPPED=$$((SKIPPED + 1))
          fi
        done

        echo "🎉 Listo — Creados: $$CREATED | Ya existían: $$SKIPPED"

  redis:
    image: redis:7-alpine
    container_name: redis-realtime
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # MICROSERVICIOS
  # ─────────────────────────────────────────

  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: ms-gateway
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - LEGACY_JWT_SECRET
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy

  users:
    build:
      context: ../microservices/users
      dockerfile: Dockerfile
    container_name: ms-users
    restart: always
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${USERS_DB_HOST}
      - DB_PORT=${USERS_DB_PORT}
      - DB_USER=${USERS_DB_USER}
      - DB_PASSWORD=${USERS_DB_PASSWORD}
      - DB_NAME=${USERS_DB_NAME}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy

  orders:
    build:
      context: ../microservices/orders
      dockerfile: Dockerfile
    container_name: ms-orders
    restart: always
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${ORDERS_DB_HOST}
      - DB_PORT=${ORDERS_DB_PORT}
      - DB_USER=${ORDERS_DB_USER}
      - DB_PASSWORD=${ORDERS_DB_PASSWORD}
      - DB_NAME=${ORDERS_DB_NAME}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - MYSQL_DB_HOST1=${MYSQL_DB_HOST1}
      - MYSQL_DB_USER=${MYSQL_DB_USER}
      - MYSQL_DB_PORT=${MYSQL_DB_PORT}
      - MYSQL_DB_PASSWORD=${MYSQL_DB_PASSWORD}
      - MYSQL_DB_NAME=${MYSQL_DB_NAME}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      rabbitmq:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully

  clients:
    build:
      context: ../microservices/clients
      dockerfile: Dockerfile
    container_name: ms-clients
    restart: always
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${CLIENTS_DB_HOST}
      - DB_PORT=${CLIENTS_DB_PORT}
      - DB_USER=${CLIENTS_DB_USER}
      - DB_PASSWORD=${CLIENTS_DB_PASSWORD}
      - DB_NAME=${CLIENTS_DB_NAME}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully

  companies:
    build:
      context: ../microservices/companies
      dockerfile: Dockerfile
    container_name: ms-companies
    restart: always
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${COMPANIES_DB_HOST}
      - DB_PORT=${COMPANIES_DB_PORT}
      - DB_USER=${COMPANIES_DB_USER}
      - DB_PASSWORD=${COMPANIES_DB_PASSWORD}
      - DB_NAME=${COMPANIES_DB_NAME}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy

  subscriptions:
    build:
      context: ../microservices/subscriptions
      dockerfile: Dockerfile
    container_name: ms-subscriptions
    restart: always
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${SUBSCRIPTIONS_DB_HOST}
      - DB_PORT=${SUBSCRIPTIONS_DB_PORT}
      - DB_USER=${SUBSCRIPTIONS_DB_USER}
      - DB_PASSWORD=${SUBSCRIPTIONS_DB_PASSWORD}
      - DB_NAME=${SUBSCRIPTIONS_DB_NAME}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy

  reports:
    build:
      context: ../microservices/reporting-hub
      dockerfile: Dockerfile
    container_name: ms-reports
    restart: always
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_NAME=${MONGODB_DB_REPORTS}
      - MONGODB_URI=${MONGODB_URI}
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get({host:'127.0.0.1',port:3000,path:'/health'}, r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  notification-dispatcher:
    build:
      context: ../microservices/notification-dispatcher
      dockerfile: Dockerfile
    container_name: ms-notification-dispatcher
    restart: always
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${DISPATCHER_DB_HOST}
      - DB_PORT=${DISPATCHER_DB_PORT}
      - DB_USER=${DISPATCHER_DB_USER}
      - DB_PASSWORD=${DISPATCHER_DB_PASSWORD}
      - DB_NAME=${DISPATCHER_DB_NAME}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get({host:'127.0.0.1',port:3001,path:'/health'}, r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  notifications:
    build:
      context: ../microservices/notifications
      dockerfile: Dockerfile
    container_name: ms-notifications
    restart: always
    ports:
      - "3010:3010"
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - PORT=3010
      - DB_NAME=${DB_NAME_NOTIFICATIONS}
      - MONGODB_URI=${MONGODB_URI_NOTIFICATIONS}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get({host:'127.0.0.1',port:3010,path:'/health'}, r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  realtime:
    build:
      context: ../realtime
      dockerfile: Dockerfile
    container_name: ms-realtime
    restart: always
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379
    ports:
      - "3002:3002"
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # TASK BOARD MICROSERVICE
  # ─────────────────────────────────────────

  task-board:
    build:
      context: ../microservices/task-board
      dockerfile: Dockerfile  # Usar Dockerfile de producción (no .dev)
    container_name: ms-task-board
    restart: always
    ports:
      - "3005:3001"
    environment:
      - NODE_ENV=production  # Cambiado a production
      - PORT=3000
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${TASKBOARD_DB_HOST}  # Variable específica
      - DB_PORT=${TASKBOARD_DB_PORT}
      - DB_USER=${TASKBOARD_DB_USER}
      - DB_PASSWORD=${TASKBOARD_DB_PASSWORD}
      - DB_NAME=${DB_NAME_TASKBOARDS}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get({host:'127.0.0.1',port:3001,path:'/health'}, r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

networks:
  backend:

volumes:
  kafka_data:
  redis_data: