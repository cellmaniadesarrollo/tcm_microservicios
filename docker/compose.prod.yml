# docker/compose.prod.yml
# Versión de producción en EC2 con RabbitMQ LOCAL (no expuesto)
# - RabbitMQ corre en la misma máquina (red backend privada)
# - Puertos 5672/15672 NO expuestos al exterior (solo interno)
# - Sin volúmenes de código (no hot-reload)
# - Comandos en modo producción
# - Variables DB_ específicas por microservicio
# - init-kafka crea los topics antes de levantar los microservicios

services:
  # ─────────────────────────────────────────
  # INFRAESTRUCTURA
  # ─────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    # NO exponer puertos al exterior (seguridad)
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always

  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
      - "9094:9094"   # ← este es el que falt
    environment:
      # KRaft obligatorio
      - KAFKA_NODE_ID=${KAFKA_NODE_ID:-1}
      - KAFKA_PROCESS_ROLES=${KAFKA_PROCESS_ROLES:-broker,controller}
      - KAFKA_CONTROLLER_QUORUM_VOTERS=${KAFKA_CONTROLLER_QUORUM_VOTERS:-1@kafka:9093}
      - KAFKA_CONTROLLER_LISTENER_NAMES=${KAFKA_CONTROLLER_LISTENER_NAMES:-CONTROLLER}

      # Listeners y Advertised (Configuración crítica para comunicación interna)
      - KAFKA_LISTENERS=${KAFKA_LISTENERS:-PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093}
      - KAFKA_ADVERTISED_LISTENERS=${KAFKA_ADVERTISED_LISTENERS:-PLAINTEXT://kafka:9092}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:-CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT}
      - KAFKA_INTER_BROKER_LISTENER_NAME=${KAFKA_INTER_BROKER_LISTENER_NAME:-PLAINTEXT}

      # Configuraciones de producción
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:-1}
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR:-1}
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:-1}
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=${KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS:-0}
      - KAFKA_LOG_RETENTION_HOURS=${KAFKA_LOG_RETENTION_HOURS:-168}
      - KAFKA_NUM_PARTITIONS=${KAFKA_NUM_PARTITIONS:-1}
      - CLUSTER_ID=${CLUSTER_ID} # Este sí debe venir del .env obligatoriamente
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────
  # JOB: Crear topics en Kafka
  # Corre una sola vez y termina (exit 0).
  # Para agregar un topic nuevo, solo añade
  # una línea a la lista TOPICS.
  # ─────────────────────────────────────────

  init-kafka:
    image: apache/kafka:3.8.0
    container_name: init-kafka
    restart: "no"
    networks:
      - backend
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        TOPICS="
          ms.client.created
          ms.client.updated
          ms.company.created
          ms.company.updated
          ms.user.created
          ms.user.updated
          ms.client.billing.created
          ms.client.billing.updated
        "

        echo "⏳ Creando topics en Kafka..."

        for TOPIC in $$TOPICS; do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 \
            --create --if-not-exists \
            --topic $$TOPIC \
            --partitions 1 --replication-factor 1
        done

        echo "🎉 Todos los topics listos"

  redis:
    image: redis:7-alpine
    container_name: redis-realtime
    restart: always
    # NO exponer puertos al exterior (seguridad)
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # MICROSERVICIOS
  # ─────────────────────────────────────────

  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: ms-gateway
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - LEGACY_JWT_SECRET
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy

  users:
    build:
      context: ../microservices/users
      dockerfile: Dockerfile
    container_name: ms-users
    restart: always
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${USERS_DB_HOST}
      - DB_PORT=${USERS_DB_PORT}
      - DB_USER=${USERS_DB_USER}
      - DB_PASSWORD=${USERS_DB_PASSWORD}
      - DB_NAME=${USERS_DB_NAME}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy

  orders:
    build:
      context: ../microservices/orders
      dockerfile: Dockerfile
    container_name: ms-orders
    restart: always
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${ORDERS_DB_HOST}
      - DB_PORT=${ORDERS_DB_PORT}
      - DB_USER=${ORDERS_DB_USER}
      - DB_PASSWORD=${ORDERS_DB_PASSWORD}
      - DB_NAME=${ORDERS_DB_NAME}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - MYSQL_DB_HOST1=${MYSQL_DB_HOST1}
      - MYSQL_DB_USER=${MYSQL_DB_USER}
      - MYSQL_DB_PORT=${MYSQL_DB_PORT}
      - MYSQL_DB_PASSWORD=${MYSQL_DB_PASSWORD}
      - MYSQL_DB_NAME=${MYSQL_DB_NAME}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      rabbitmq:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully

  clients:
    build:
      context: ../microservices/clients
      dockerfile: Dockerfile
    container_name: ms-clients
    restart: always
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${CLIENTS_DB_HOST}
      - DB_PORT=${CLIENTS_DB_PORT}
      - DB_USER=${CLIENTS_DB_USER}
      - DB_PASSWORD=${CLIENTS_DB_PASSWORD}
      - DB_NAME=${CLIENTS_DB_NAME}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully

  companies:
    build:
      context: ../microservices/companies
      dockerfile: Dockerfile
    container_name: ms-companies
    restart: always
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${COMPANIES_DB_HOST}
      - DB_PORT=${COMPANIES_DB_PORT}
      - DB_USER=${COMPANIES_DB_USER}
      - DB_PASSWORD=${COMPANIES_DB_PASSWORD}
      - DB_NAME=${COMPANIES_DB_NAME}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy

  subscriptions:
    build:
      context: ../microservices/subscriptions
      dockerfile: Dockerfile
    container_name: ms-subscriptions
    restart: always
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${SUBSCRIPTIONS_DB_HOST}
      - DB_PORT=${SUBSCRIPTIONS_DB_PORT}
      - DB_USER=${SUBSCRIPTIONS_DB_USER}
      - DB_PASSWORD=${SUBSCRIPTIONS_DB_PASSWORD}
      - DB_NAME=${SUBSCRIPTIONS_DB_NAME}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy

  realtime:
    build:
      context: ../realtime
      dockerfile: Dockerfile
    container_name: ms-realtime
    restart: always
    environment:
      - NODE_ENV=production
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - RABBIT_URL=amqp://guest:guest@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379
    ports:
      - "3002:3002"
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  backend:

volumes:
  kafka_data:
  redis_data: