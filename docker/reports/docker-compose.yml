name: tcm-reports

services:
  companies:
    build:
      context: ../../microservices/reporting-hub
      dockerfile: Dockerfile.dev
    container_name: ms-reports
    restart: always
    volumes:
      - ../../microservices/reporting-hub:/app
      - /app/node_modules
    command: ["npm", "run", "start:dev"]
    env_file: [../.env]
    environment:
      - DB_NAME=${MONGODB_DB_REPORTS}
      - MONGODB_URI
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get({host:'127.0.0.1',port:3000,path:'/health'}, r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

networks:
  backend:
    external: true