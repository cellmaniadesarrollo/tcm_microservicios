name: tcm-taskBoard

services:
  taskboard:
    build:
      context: ../../microservices/task-taskBoard
      dockerfile: Dockerfile.dev
    container_name: ms-taskBoard
    restart: always
    volumes:
      - ../../microservices/task-taskBoard:/app
      - /app/node_modules
    command: ["npm", "run", "start:dev"]
    env_file: 
      - ../.env
    environment:
      - NODE_ENV=development
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME_TASKBOARDS}
      - RABBIT_URL=${RABBIT_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

networks:
  backend:
    external: true