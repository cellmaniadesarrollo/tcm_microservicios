name: tcm-task-board  # Cambiar nombre

services:
  taskboard:
    build:
      context: ../../microservices/task-board  # <- Ruta correcta
      dockerfile: Dockerfile.dev
    container_name: ms-task-board  # <- Cambiar nombre del contenedor
    restart: always
    ports:
      - "3005:3001"  # Puerto para no conflictuar
    volumes:
      - ../../microservices/task-board:/app  # <- Ruta correcta
      - /app/node_modules
    command: ["npm", "run", "start:dev"]
    env_file: 
      - ../.env
    environment:
      - NODE_ENV=development
      - PORT=3000
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME_TASKBOARDS}
      - RABBIT_URL=${RABBIT_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - FRONTEND_URL=${FRONTEND_URL}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get({host:'127.0.0.1',port:3001,path:'/health'}, r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  backend:
    external: true